services:
  reverse-proxy:
    image: nginx:stable-perl

  eventstore:
    build: .

  eventdb:
    image: postgres:17
    volumes:
      - postgres:/dev/shm
      - "./EventDb:/app"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=purplemonster
    entrypoint: ["postgres; "]

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  postgres:
  